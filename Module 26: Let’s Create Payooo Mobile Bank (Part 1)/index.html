<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Payment</title>
    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col justify-center items-center h-screen bg-gray-100">
    <div class="w-[90%] h-[150px] bg-[url(./assets/bg.png)] bg-no-repeat bg-cover flex justify-center items-center">
        <img src="./assets/Group.png" alt="">
    </div>
    <form class=" mx-auto p-5 space-y-2 rounded-2xl w-[90%] bg-white">
        <div>
            <label for="mobile" class="font-semibold">Mobile Number</label> <br>
            <input type="text" id="mobile" placeholder="Enter Mobile Number" class="rounded-3xl input mt-2 w-full" />
        </div>
        <div>
            <label for="password" class="font-semibold">4 Digit Pin</label> <br>
            <input type="text" id="Pin" placeholder="Enter 4 Digit Pin" class="rounded-3xl input mt-2 w-full" />
        </div>
        <button class="font-semibold btn text-white bg-sky-500 w-full rounded-3xl mt-2" id="login-btn">Login</button>
    </form>


    <script src="script.js"></script>
</body>

</html>
